<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาทำงาน (Check-in System)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* อนิเมชั่นพื้นหลังไล่สีขยับได้สไตล์ Instagram */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            background-size: 400% 400%;
            animation: instagramGradient 12s ease infinite;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes instagramGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* การ์ดหน้าต่างโปรเจกต์พร้อมอนิเมชั่นเด้งเข้าแบบสมูท (Professional Motion) */
        .container {
            background-color: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
            width: 100%;
            max-width: 620px;
            padding: 40px;
            transform: translateY(40px);
            opacity: 0;
            animation: cardEntrance 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardEntrance {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ตกแต่งหัวข้อเว็บ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            background: linear-gradient(45deg, #dc2743, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* เส้นปะตัดแบ่งโซนการกรอก */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #cc2366;
            margin: 25px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px dashed #f1f2f6;
            letter-spacing: 0.5px;
        }
        
        .section-title:first-of-type {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #4a4a4a;
            font-size: 14px;
        }

        /* ออกแบบช่อง Input ให้นุ่มนวลเวลาคลิก */
        .form-control {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #eef0f3;
            border-radius: 12px;
            font-size: 15px;
            color: #2c3e50;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background-color: #ffffff;
        }

        .form-control:focus {
            border-color: #dc2743;
            box-shadow: 0 0 0 4px rgba(220, 39, 67, 0.12);
            background-color: #fff;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%237f8c8d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 14px;
            padding-right: 40px;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .col {
            flex: 1;
        }

        /* ปุ่มบันทึกแบบไล่เฉดสี Instagram ชนิดเลื่อนเอฟเฟกต์เวลา Hover */
        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366);
            background-size: 200% 100%;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.25);
            transition: all 0.4s ease;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background-position: 100% 0;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 39, 67, 0.35);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            background: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ระบบหน้าต่างป็อปอัพคำถามหลังบันทึก (Custom Modal) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 24px;
            max-width: 460px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 55px;
            margin-bottom: 12px;
            animation: bounceIcon 1s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        @keyframes bounceIcon {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .modal-box h3 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .modal-box p {
            color: #7f8c8d;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 14px;
        }

        .btn-modal {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-yes {
            background: linear-gradient(45deg, #e6683c, #dc2743);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 39, 67, 0.2);
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(220, 39, 67, 0.3);
        }

        .btn-no {
            background-color: #f1f2f6;
            color: #57606f;
        }

        .btn-no:hover {
            background-color: #e4e7eb;
            color: #2f3542;
        }

        /* 🌙 หน้าต่างป็อปอัพพิเศษ ธีมท้องฟ้าดวงดาวราตรีบอกฝันดีจากบอสเอส */
        .sleep-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            overflow: hidden;
        }

        .sleep-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* เอฟเฟกต์ดวงดาววิ่งระยิบระยับ */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starMovement 30s linear infinite;
        }

        @keyframes starMovement {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 680px 820px; }
        }

        .sleep-box {
            text-align: center;
            color: #ffffff;
            z-index: 3100;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .sleep-overlay.active .sleep-box {
            transform: scale(1);
            opacity: 1;
        }

        .sleep-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: floatingSleep 3s ease-in-out infinite alternate;
        }

        @keyframes floatingSleep {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-15px) rotate(5deg); }
        }

        .sleep-box h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        .sleep-box p {
            color: #a4b0be;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .btn-wakeup {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-wakeup:hover {
            background-color: #ffffff;
            color: #090a0f;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* แถบหลอดดาวน์โหลดเด้งดึ๋งด้านบนสุด (Progress Loading Bar) */
        .loading-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(to right, #f09433, #e6683c, #dc2743, #cc2366);
            width: 0;
            z-index: 2000;
            transition: width 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        @media (max-width: 580px) {
            .row { flex-direction: column; gap: 0; }
            .container { padding: 30px 20px; }
            .modal-buttons { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="loading-line" id="loadingLine"></div>

<div class="container">
    <div class="header">
        <h2>ระบบบันทึกเวลาทำงาน</h2>
        <p>กรุณากรอกรายละเอียดเพื่อเช็คชื่อเข้า-ออกงาน</p>
    </div>

    <form id="attendanceForm">
        <div class="section-title">ข้อมูลพนักงาน</div>
        
        <div class="form-group">
            <label for="fullName">ชื่อ - นามสกุล</label>
            <input type="text" id="fullName" name="fullName" class="form-control" placeholder="กรอกชื่อและนามสกุลของคุณ" required>
        </div>

        <div class="form-group">
            <label for="employeeType">ประเภทพนักงาน</label>
            <select id="employeeType" name="employeeType" class="form-control" required>
                <option value="" disabled selected>เลือกประเภทพนักงาน</option>
                <option value="ทีมดี">ทีมดี</option>
                <option value="ทีมเฮียเอกซ์">ทีมเฮียเอกซ์</option>
                <option value="ทีมโพดต้ม">ทีมโพดต้ม</option>
                <option value="ฟรีแลนซ์">ฟรีแลนซ์</option>
                <option value="พนักงาน All Time">พนักงาน All Time</option>
            </select>
        </div>

        <div class="section-title">รายละเอียดงาน</div>

        <div class="form-group">
            <label for="jobName">ชื่องาน / โปรเจกต์ที่ปฏิบัติ</label>
            <input type="text" id="jobName" name="jobName" class="form-control" placeholder="ตัวอย่าง: พัฒนาเว็บไซต์ / งานเอกสาร" required>
        </div>

        <div class="form-group">
            <label for="workLocation">สถานที่ปฏิบัติงาน (พิมพ์ระบุ)</label>
            <input type="text" id="workLocation" name="workLocation" class="form-control" placeholder="พิมพ์ระบุสถานที่ทำงานของคุณ เช่น ออฟฟิศ, หน้างาน, WFH" required>
        </div>

        <div class="section-title">บันทึกเวลาทำงาน</div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="checkInTime">วัน เวลาที่เข้างาน</label>
                    <input type="datetime-local" id="checkInTime" name="checkInTime" class="form-control" required>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="checkOutTime">วัน เวลาที่ออกงาน</label>
                    <input type="datetime-local" id="checkOutTime" name="checkOutTime" class="form-control" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">🚀 บันทึก</button>
    </form>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-icon">🎉</div>
        <h3>บันทึกเสร็จสิ้น!</h3>
        <p>ต้องการบันทึกข้อมูลของพนักงานคนอื่นต่อหรือไม่?</p>
        <div class="modal-buttons">
            <button class="btn-modal btn-yes" id="btnYes">✨ เจ๋งไปเลย</button>
            <button class="btn-modal btn-no" id="btnNo">🛌 กลับบ้านนอนดีกว่า</button>
        </div>
    </div>
</div>

<div class="sleep-overlay" id="sleepOverlay">
    <div class="stars"></div>
    <div class="sleep-box">
        <div class="sleep-emoji">✨🛌💤</div>
        <h1>ฝันดีคับอิอิจากบอสเอส</h1>
        <p>ระบบบันทึกเวลาทำงานเรียบร้อยแล้ว พักผ่อนได้เลยครับคุณพนักงาน</p>
        <button class="btn-wakeup" id="btnWakeup">ตื่นกลับมาหน้าเว็บ</button>
    </div>
</div>

<script>
    // ตั้งค่าเวลาเป็นปัจจุบันเริ่มต้น
    function setInitialTime() {
        const now = new Date();
        const tzoffset = now.getTimezoneOffset() * 60000; 
        const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 16);
        
        document.getElementById('checkInTime').value = localISOTime;
        document.getElementById('checkOutTime').value = localISOTime;
    }

    window.addEventListener('DOMContentLoaded', setInitialTime);

    // ฟังก์ชันพิเศษ: บังคับแปลงค่า datetime-local เป็นรูปแบบ 24 ชั่วโมง "ปปปป-ดด-วว ชช:นน น."
    function convertTo24HourFormat(datetimeLocalValue) {
        if (!datetimeLocalValue) return "";
        const [datePart, timePart] = datetimeLocalValue.split('T');
        if (!timePart) return datePart;
        return `${datePart} ${timePart} น.`;
    }

    // ฟังก์ชันคำนวณระยะเวลาทั้งหมด (ส่งเข้าคอลัมน์ G และ H)
    function calculateWorkDuration(checkInStr, checkOutStr) {
        if (!checkInStr || !checkOutStr) return { g: "", h: "" };
        
        const d1 = new Date(checkInStr);
        const d2 = new Date(checkOutStr);
        const diffMs = d2 - d1;
        
        if (isNaN(diffMs) || diffMs < 0) return { g: "0 ชั่วโมง", h: "0 ชั่วโมง" };
        
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalHours = totalSeconds / 3600;
        
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        
        // จัดรูปแบบคอลัมน์ G (เช่น 7.5 ชั่วโมง)
        const g_value = totalHours % 1 !== 0 ? totalHours.toFixed(1) + " ชั่วโมง" : Math.floor(totalHours) + " ชั่วโมง";
        
        // จัดรูปแบบคอลัมน์ H (เช่น 7 ชั่วโมง 30 นาที)
        let h_value = "";
        if (hours > 0) {
            h_value = hours + " ชั่วโมง" + (minutes > 0 ? " " + minutes + " นาที" : "");
        } else {
            h_value = minutes + " นาที";
        }
        
        return { g: g_value, h: h_value };
    }

    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingLine = document.getElementById('loadingLine');
    const modalOverlay = document.getElementById('modalOverlay');
    const sleepOverlay = document.getElementById('sleepOverlay');
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const btnWakeup = document.getElementById('btnWakeup');

    // ลิงก์ยิงเข้าสู่ Google Apps Script ของคุณ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz941b4M4UJfvnCF0WmCcRUZnh4b70f0MR7INKmrRQLCPkxafVuAD9wcPyAzcoAdsz9MA/exec";

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        loadingLine.style.width = '75%';
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ กำลังบันทึกข้อมูล...";

        // ดึงค่าเวลาดิบไปใช้คำนวณคอลัมน์ G และ H ก่อนแปลงฟอร์แมต
        const rawCheckIn = document.getElementById('checkInTime').value;
        const rawCheckOut = document.getElementById('checkOutTime').value;
        const duration = calculateWorkDuration(rawCheckIn, rawCheckOut);

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => {
            if (key === 'checkInTime' || key === 'checkOutTime') {
                data[key] = convertTo24HourFormat(value); 
            } else {
                data[key] = value;
            }
        });

        // แทรกค่าความต่างชั่วโมงทำงานลง Object ส่งไปให้ Google Apps Script รับลงช่องคอลัมน์ G และ H
        data['workDurationDecimal'] = duration.g; // ตัวแปรคอลัมน์ G
        data['workDurationText'] = duration.h;    // ตัวแปรคอลัมน์ H

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            loadingLine.style.width = '100%';
            setTimeout(() => { loadingLine.style.width = '0'; }, 350);

            submitBtn.disabled = false;
            submitBtn.textContent = "🚀 บันทึก";

            modalOverlay.classList.add('active');
        })
        .catch(error => {
            console.error('Error:', error);
            alert("ระบบขัดข้องบางประการ กรุณากดบันทึกใหม่อีกครั้ง");
            loadingLine.style.width = '0';
            submitBtn.disabled = false;
            submitBtn.textContent = "🚀 บันทึก";
        });
    });

    // ปุ่ม "เจ๋งไปเลย" -> ลบเฉพาะชื่อนามสกุล นอกนั้นคงไว้ทั้งหมดตามข้อ 1
    btnYes.addEventListener('click', function() {
        modalOverlay.classList.remove('active');
        
        // ล้างเฉพาะชื่อพนักงานช่องเดียวเท่านั้น
        document.getElementById('fullName').value = "";
        
        // ชิ้นส่วนอื่นคงค่าเดิมไว้ ไม่ต้องกวนระบบฟอร์มรีเซ็ต!
    });

    // ปุ่ม "กลับบ้านนอนดีกว่า" -> เปิดหน้าต่างสลีปดวงดาวอวกาศฉบับเคลื่อนไหวตามข้อ 3
    btnNo.addEventListener('click', function() {
        modalOverlay.classList.remove('active');
        sleepOverlay.classList.add('active');
    });

    // ปุ่มสำหรับปลุกกลับมาหน้าเว็บปกติจากหน้าบอกฝันดี
    btnWakeup.addEventListener('click', function() {
        sleepOverlay.classList.remove('active');
        form.reset();
        setInitialTime();
    });
</script>
</body>
</html>
