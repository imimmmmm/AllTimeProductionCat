<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาทำงาน (Check-in System)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef0f3;
            padding-bottom: 15px;
        }

        .header h2 {
            color: #1a73e8;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #dadce0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fff;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .btn-submit {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1557b0;
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status-success {
            background-color: #e6f4ea;
            color: #137333;
            border: 1px solid #ceead6;
            display: block;
        }

        .status-error {
            background-color: #fce8e6;
            color: #c5221f;
            border: 1px solid #fad2cf;
            display: block;
        }

        .status-loading {
            background-color: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #d2e3fc;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ระบบเช็คชื่อและบันทึกเวลาทำงาน</h2>
        <p>กรุณากรอกข้อมูลให้ครบถ้วนเพื่อบันทึกลง Google Sheets</p>
    </div>

    <form id="attendanceForm">
        <div class="form-group">
            <label for="fullName">ชื่อ - นามสกุล</label>
            <input type="text" id="fullName" name="fullName" class="form-control" placeholder="ตัวอย่าง: สมชาย ใจดี" required>
        </div>

        <div class="form-group">
            <label for="employeeType">ประเภทพนักงาน</label>
            <select id="employeeType" name="employeeType" class="form-control" required>
                <option value="" disabled selected>เลือกประเภทพนักงาน</option>
                <option value="พนักงานประจำ (Full-time)">พนักงานประจำ (Full-time)</option>
                <option value="พนักงานพาร์ทไทม์ (Part-time)">พนักงานพาร์ทไทม์ (Part-time)</option>
                <option value="พนักงานสัญญาจ้าง (Contract)">พนักงานสัญญาจ้าง (Contract)</option>
                <option value="นักศึกษาฝึกงาน (Intern)">นักศึกษาฝึกงาน (Intern)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="jobName">ชื่องาน / ตำแหน่ง / โปรเจกต์</label>
            <input type="text" id="jobName" name="jobName" class="form-control" placeholder="ตัวอย่าง: พัฒนาเว็บไซต์ / ตรวจสอบเอกสาร" required>
        </div>

        <div class="form-group">
            <label for="workLocation">สถานที่ทำงาน</label>
            <select id="workLocation" name="workLocation" class="form-control" required>
                <option value="" disabled selected>เลือกสถานที่ทำงาน</option>
                <option value="สำนักงานใหญ่ (HQ)">สำนักงานใหญ่ (HQ)</option>
                <option value="ทำงานจากบ้าน (WFH)">ทำงานจากบ้าน (WFH)</option>
                <option value="ปฏิบัติงานนอกสถานที่ (On-site)">ปฏิบัติงานนอกสถานที่ (On-site)</option>
                <option value="สาขาย่อย">สาขาย่อย</option>
            </select>
        </div>

        <div class="form-group">
            <label for="checkInTime">วัน เวลาที่เข้างาน (กดเพื่อเลือกจากปฏิทินและเวลา)</label>
            <input type="datetime-local" id="checkInTime" name="checkInTime" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="checkOutTime">วัน เวลาที่ออกงาน (กดเพื่อเลือกจากปฏิทินและเวลา)</label>
            <input type="datetime-local" id="checkOutTime" name="checkOutTime" class="form-control" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูล</button>
    </form>

    <div id="statusBox" class="status-message"></div>
</div>

<script>
    // ตั้งเวลาปัจจุบันเป็นตัวเลือกเริ่มต้นเพื่อให้กดเลื้อง่ายขึ้น
    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        const tzoffset = now.getTimezoneOffset() * 60000; 
        const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 16);
        
        document.getElementById('checkInTime').value = localISOTime;
        document.getElementById('checkOutTime').value = localISOTime;
    });

    const form = document.getElementById('attendanceForm');
    const statusBox = document.getElementById('statusBox');
    const submitBtn = document.getElementById('submitBtn');

    // ลิงก์ Web App URL ของคุณที่ใส่ไว้เรียบร้อยแล้ว
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz941b4M4UJfvnCF0WmCcRUZnh4b70f0MR7INKmrRQLCPkxafVuAD9wcPyAzcoAdsz9MA/exec";

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        showStatus("กำลังบันทึกข้อมูล กรุณารอสักครู่...", "loading");
        submitBtn.disabled = true;

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => {
            if (key === 'checkInTime' || key === 'checkOutTime') {
                data[key] = value.replace('T', ' '); // เปลี่ยนตัว T เป็นเว้นวรรคให้อ่านง่ายบน Sheet
            } else {
                data[key] = value;
            }
        });

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            showStatus("บันทึกข้อมูลลง Google Sheet สำเร็จเรียบร้อยแล้ว!", "success");
            form.reset();
            submitBtn.disabled = false;
            
            // ตั้งค่าเวลาใหม่หลังจากรีเซ็ตฟอร์มสำเร็จ
            const now = new Date();
            const tzoffset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, 16);
            document.getElementById('checkInTime').value = localISOTime;
            document.getElementById('checkOutTime').value = localISOTime;
        })
        .catch(error => {
            console.error('Error:', error);
            showStatus("เกิดข้อผิดพลาดไม่สามารถบันทึกข้อมูลได้: " + error.message, "error");
            submitBtn.disabled = false;
        });
    });

    function showStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = "status-message"; 
        
        if (type === "success") {
            statusBox.classList.add("status-success");
        } else if (type === "error") {
            statusBox.classList.add("status-error");
        } else if (type === "loading") {
            statusBox.classList.add("status-loading");
        }
    }
</script>
</body>
</html>
